<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f2ec" />
    <title>Wilde Aparthotels | Room Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/wilde.css" />
</head>
<body>
    <div class="wilde-shell">
        <div class="wilde-backdrop" aria-hidden="true">
            <div class="wilde-glow"></div>
            <div class="wilde-noise"></div>
        </div>

        <main class="wilde-page">
            <section class="wilde-view" id="wildeHomeView">
                <header class="wilde-header">
                    <p class="wilde-kicker">In-room dining</p>
                    <h1>Room Service</h1>
                    <div class="wilde-rule"></div>
                    <p class="wilde-subtitle">Wilde Aparthotels</p>
                </header>

                <section class="wilde-grid" id="wildeGrid" aria-label="Room service destinations"></section>
            </section>

            <section class="wilde-view wilde-view-hidden" id="wildeShopView">
                <header class="wilde-shop-header">
                    <button class="wilde-back-button" id="wildeBackButton" type="button" aria-label="Back to room service">
                        <span aria-hidden="true">←</span>
                    </button>

                    <div class="wilde-shop-heading">
                        <p class="wilde-kicker" id="wildeShopKicker">Room service</p>
                        <h1 id="wildeShopTitle">Breakfast</h1>
                        <p class="wilde-shop-subtitle" id="wildeShopSubtitle">Morning room service</p>
                    </div>
                </header>

                <section class="wilde-shop-hero" id="wildeShopHero"></section>

                <nav class="wilde-category-bar" id="wildeCategoryBar" aria-label="Categories"></nav>

                <section class="wilde-menu-stack" id="wildeMenuStack" aria-label="Products"></section>
            </section>
        </main>

        <div class="wilde-toast" id="wildeToast" role="status" aria-live="polite"></div>
    </div>

    <script src="/js/wilde.js"></script>
</body>
</html>
